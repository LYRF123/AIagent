<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>呆呆鸟助手</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='34' r='22' fill='%23FACC3C'/><path d='M22 14 L24 5 L26 14 Z' fill='%232a2a2a'/><path d='M31 12 L33 3 L35 12 Z' fill='%232a2a2a'/><path d='M40 14 L42 5 L44 14 Z' fill='%232a2a2a'/><circle cx='24' cy='30' r='4.5' fill='white'/><circle cx='40' cy='30' r='4.5' fill='white'/><circle cx='24' cy='30' r='1.6' fill='%231a1a1a'/><circle cx='40' cy='30' r='1.6' fill='%231a1a1a'/><ellipse cx='32' cy='42' rx='9' ry='5' fill='%23E8931E'/></svg>" />
    <link rel="stylesheet" href="/static/styles.css?v=20260509-1" />
  </head>
  <body>
    <div class="app-shell">
      <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="切换侧栏">
        <span class="toggle-icon"></span>
      </button>

      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 64 64" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 14 L24 5 L26 14 Z" fill="#2a2a2a"/>
                <path d="M31 12 L33 3 L35 12 Z" fill="#2a2a2a"/>
                <path d="M40 14 L42 5 L44 14 Z" fill="#2a2a2a"/>
                <circle cx="32" cy="34" r="21" fill="#FACC3C"/>
                <ellipse cx="32" cy="44" rx="10" ry="5" fill="#E8931E"/>
                <circle cx="24" cy="30" r="5" fill="#ffffff"/>
                <circle cx="40" cy="30" r="5" fill="#ffffff"/>
                <circle cx="24" cy="30" r="1.8" fill="#1a1a1a"/>
                <circle cx="40" cy="30" r="1.8" fill="#1a1a1a"/>
              </svg>
            </span>
            <h2 class="sidebar-brand">呆呆鸟助手</h2>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="对话导航">
          <button id="new-chat" class="nav-button nav-button-primary" type="button">
            <span aria-hidden="true">+</span>
            新建对话
          </button>

          <div class="sidebar-section">
            <button class="nav-button nav-button-static" type="button" aria-expanded="true">
              <span aria-hidden="true">⌕</span>
              历史对话
            </button>
            <div class="sidebar-history" id="sessions-output">
              <p class="empty-note">还没有会话。</p>
            </div>
          </div>

          <button id="upload-doc-button" class="nav-button" type="button">
            <span aria-hidden="true">📄</span>
            导入文档
          </button>
          <input id="upload-file-input" type="file" accept=".pdf,.docx,.txt" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;" />

          <button id="settings-button" class="nav-button" type="button">
            <span aria-hidden="true">⚙</span>
            设置
          </button>
        </nav>

        <div class="sidebar-footer">
          <button id="clear-chat" class="danger-button" type="button">清空对话</button>
        </div>
      </aside>

      <main id="main-content" class="chat-main">
        <section class="conversation-panel" aria-labelledby="assistant-title">
          <header class="chat-panel-header">
            <div>
              <p class="panel-kicker">Assistant</p>
              <h1 id="assistant-title">呆呆鸟助手</h1>
            </div>
            <span class="status-pill">在线</span>
          </header>

          <div id="chat-messages" class="chat-messages">
            <div id="welcome-screen" class="welcome-screen">
              <div class="welcome-copy">
                <div class="welcome-mascot" aria-hidden="true">
                  <svg viewBox="0 0 160 160" width="96" height="96" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="80" cy="148" rx="40" ry="5" fill="rgba(28,42,31,0.12)"/>
                    <path d="M52 40 L56 18 L60 40 Z" fill="#2a2a2a"/>
                    <path d="M76 36 L80 14 L84 36 Z" fill="#2a2a2a"/>
                    <path d="M100 40 L104 18 L108 40 Z" fill="#2a2a2a"/>
                    <ellipse cx="80" cy="86" rx="50" ry="52" fill="#FACC3C"/>
                    <ellipse cx="80" cy="100" rx="46" ry="44" fill="#FFDE66"/>
                    <ellipse cx="80" cy="118" rx="28" ry="12" fill="#E8931E"/>
                    <path d="M56 118 Q80 128 104 118 Q104 130 80 132 Q56 130 56 118 Z" fill="#D97E15"/>
                    <circle cx="62" cy="78" r="13" fill="#ffffff"/>
                    <circle cx="98" cy="78" r="13" fill="#ffffff"/>
                    <circle cx="62" cy="78" r="4.2" fill="#1a1a1a"/>
                    <circle cx="98" cy="78" r="4.2" fill="#1a1a1a"/>
                    <circle cx="63.6" cy="76.4" r="1.4" fill="#ffffff"/>
                    <circle cx="99.6" cy="76.4" r="1.4" fill="#ffffff"/>
                    <ellipse cx="44" cy="96" rx="5" ry="3" fill="#F4A3A3" opacity="0.7"/>
                    <ellipse cx="116" cy="96" rx="5" ry="3" fill="#F4A3A3" opacity="0.7"/>
                  </svg>
                </div>
                <h2>今天想问什么？</h2>
                <p class="welcome-hint">呆呆鸟在认真听，你就随便问吧</p>
              </div>
            </div>
          </div>

          <div class="chat-composer-wrap">
            <form id="chat-form" class="chat-composer" action="javascript:void(0)" novalidate>
              <textarea id="chat-input" class="chat-input" placeholder="问问题..." rows="1" autofocus></textarea>
              <button id="chat-submit" class="primary-button chat-submit-btn" type="button" title="发送 (Enter)">
                <span class="submit-icon">&#x27A4;</span>
              </button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/static/app.js?v=20260508-2"></script>
  </body>
</html>
