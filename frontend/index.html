<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <button
        id="session-sidebar-toggle"
        class="session-sidebar-toggle"
        type="button"
        aria-controls="session-sidebar"
        aria-expanded="true"
        aria-label="关闭历史会话侧栏"
      >
        <span class="session-toggle-lines" aria-hidden="true"></span>
      </button>

      <aside id="session-sidebar" class="sidebar session-sidebar" aria-label="历史会话">
        <div class="sidebar-panel brand-panel">
          <p class="eyebrow">Research Agent</p>
          <h1>研究助手</h1>
          <p class="sidebar-copy">本地论文与文档研究工作台。</p>
        </div>

        <div class="sidebar-panel sessions-panel">
          <div class="section-head compact">
            <div>
              <p class="section-kicker">Sessions</p>
              <h2>会话</h2>
            </div>
            <button id="new-session" class="ghost-button compact-button" type="button">新建会话</button>
          </div>
          <div id="sessions-output" class="session-list">
            <p class="empty-note">还没有会话。</p>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="workspace-top">
          <div>
            <p class="section-kicker">Workspace</p>
            <h2>当前工作区</h2>
          </div>
          <div class="workspace-tools">
            <button id="open-tools" class="menu-button" type="button" aria-controls="utility-drawer" aria-expanded="false">工具</button>
            <button id="health-button" class="ghost-button compact-button" type="button">健康检查</button>
            <div id="mode-badge" class="mode-badge">当前模式：Ask</div>
            <div id="status-pill" class="status-pill idle" role="status" aria-live="polite">空闲</div>
          </div>
        </header>

        <footer class="composer-shell card">
          <div class="composer-head">
            <div class="mode-tabs" aria-label="运行模式">
              <button class="mode-button active" data-mode="ask" type="button" aria-pressed="true">
                <strong>Ask</strong>
                <span>Evidence Q&amp;A</span>
              </button>
              <button class="mode-button" data-mode="rag_lab" type="button" aria-pressed="false">
                <strong>RAG Lab</strong>
                <span>Evaluation</span>
              </button>
            </div>
          </div>

          <form id="agent-form" class="form-stack composer-form">
            <label class="field mode-search hidden" data-mode="search">
              <span>检索词</span>
              <textarea id="search-query" rows="6">self reflection retrieval</textarea>
            </label>

            <label class="field mode-ask" data-mode="ask">
              <span>问题</span>
              <textarea id="ask-question" rows="8">ReAct 是如何把推理和工具调用结合起来的？</textarea>
            </label>

            <div class="rag-lab-panel mode-rag_lab hidden" data-mode="rag_lab">
              <div class="rag-lab-grid">
                <label class="field slim">
                  <span>Candidate K</span>
                  <input id="candidate-k" type="number" min="1" max="100" value="20" />
                </label>
                <label class="toggle-field">
                  <input id="rag-rerank" type="checkbox" checked />
                  <span>Rerank</span>
                </label>
                <label class="toggle-field">
                  <input id="rag-compare-configs" type="checkbox" checked />
                  <span>rerank_on/off</span>
                </label>
              </div>
            </div>

            <label class="field mode-compare hidden" data-mode="compare">
              <span>论文 ID</span>
              <input id="compare-ids" value="react toolformer" />
            </label>

            <label class="field mode-compare hidden" data-mode="compare">
              <span>对比重点</span>
              <textarea id="compare-focus" rows="6">方法、结论和局限性</textarea>
            </label>

            <label class="field mode-review hidden" data-mode="review">
              <span>主题</span>
              <textarea id="review-topic" rows="6">multi agent software development</textarea>
            </label>

            <label class="field mode-evaluate hidden" data-mode="evaluate">
              <span>评测说明</span>
              <textarea id="evaluate-note" rows="6" readonly>运行内置 demo_eval.json，统计 paper 命中率、关键词命中率、平均回答长度和失败样例。</textarea>
            </label>

            <div class="composer-footer">
              <div class="composer-meta-row">
                <label class="toggle-field mode-ask" data-mode="ask">
                  <input id="strict-grounded" type="checkbox" checked />
                  <span>严格证据模式</span>
                </label>
                <label class="toggle-field mode-evaluate hidden" data-mode="evaluate">
                  <input id="use-ragas" type="checkbox" />
                  <span>Ragas 评估</span>
                </label>
                <label class="field slim topk-field">
                  <span>Top K</span>
                  <input id="top-k" type="number" min="1" max="10" value="5" />
                </label>
              </div>
              <button id="submit-button" class="primary-button composer-submit" type="submit">运行 Ask</button>
            </div>
          </form>
        </footer>

        <section class="thread-column">
          <section class="summary-card card">
            <div class="section-head compact">
              <div>
                <p class="section-kicker">Response</p>
                <h2>当前输出</h2>
              </div>
            </div>
            <div id="summary-output" class="summary-output" aria-live="polite">
              <div class="empty-state">
                <h3>还没有结果</h3>
                <p>当前请求的回答、结论和指标会显示在这里。</p>
              </div>
            </div>
          </section>

          <section class="detail-card card">
            <div class="section-head compact">
              <div>
                <p class="section-kicker">Evidence</p>
                <h2>证据与轨迹</h2>
              </div>
            </div>
            <div id="detail-output" class="detail-output" aria-live="polite">
              <p class="empty-note">证据片段、调用轨迹和结构化内容会显示在这里。</p>
            </div>
          </section>
        </section>
      </main>

      <aside id="utility-drawer" class="utility-drawer hidden" aria-hidden="true">
        <div class="utility-shell card">
          <div class="section-head compact">
            <div>
              <p class="section-kicker">Tools</p>
              <h2 id="utility-title">工具面板</h2>
            </div>
            <button id="close-utility" class="ghost-button compact-button" type="button">关闭</button>
          </div>

          <div class="utility-nav" aria-label="工具面板">
            <button class="utility-nav-button active" data-utility-panel-target="presets" type="button" aria-pressed="true">预设</button>
            <button class="utility-nav-button" data-utility-panel-target="import" type="button" aria-pressed="false">导入</button>
            <button class="utility-nav-button" data-utility-panel-target="documents" type="button" aria-pressed="false">文件</button>
            <button class="utility-nav-button" data-utility-panel-target="json" type="button" aria-pressed="false">JSON</button>
          </div>

          <section class="utility-panel" data-utility-panel="presets">
            <div class="section-head compact">
              <div>
                <p class="section-kicker">Presets</p>
                <h3>快捷示例</h3>
              </div>
            </div>
            <div class="preset-list">
              <button class="preset-button" type="button" data-preset="ask-react">问：ReAct 做了什么</button>
              <button class="preset-button" type="button" data-preset="ask-model">问：你是什么模型</button>
              <button class="preset-button" type="button" data-preset="rag-lab-default">RAG Lab：rerank 对照</button>
            </div>
          </section>

          <section class="utility-panel hidden" data-utility-panel="import">
            <div class="section-head compact">
              <div>
                <p class="section-kicker">Import</p>
                <h3>文档导入</h3>
              </div>
            </div>
            <form id="upload-form" class="form-stack">
              <label class="field">
                <span>支持 PDF / DOCX / TXT</span>
                <input id="upload-file" type="file" accept=".pdf,.docx,.txt" />
              </label>
              <button id="upload-button" class="primary-button" type="submit">导入到知识库</button>
              <p class="helper-text">导入后会自动刷新索引，后续 Ask 和 RAG Lab 会直接使用新文档。</p>
            </form>
          </section>

          <section class="utility-panel hidden" data-utility-panel="documents">
            <div class="section-head compact">
              <div>
                <p class="section-kicker">Library</p>
                <h3>知识库文件</h3>
              </div>
              <button id="refresh-documents" class="ghost-button compact-button" type="button">刷新列表</button>
            </div>
            <div id="documents-output" class="detail-output compact-output">
              <p class="empty-note">还没有导入文件。</p>
            </div>
          </section>

          <section class="utility-panel hidden" data-utility-panel="json">
            <div class="section-head compact">
              <div>
                <p class="section-kicker">Raw</p>
                <h3>原始 JSON</h3>
              </div>
            </div>
            <pre id="json-output" class="json-output">{}</pre>
          </section>
        </div>
      </aside>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
